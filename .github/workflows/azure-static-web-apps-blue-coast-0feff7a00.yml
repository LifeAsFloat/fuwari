name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # 1. 安装 Node.js (Fuwari 推荐使用 Node 18 或 20)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 2. 安装 pnpm (因为 Fuwari 强制要求 pnpm)
      - uses: pnpm/action-setup@v2
        with:
          version: 8

      # 3. 手动执行安装和打包
      # 这步完成后，你的项目根目录下会出现一个 dist 文件夹，里面才是真正的网页
      - name: Install dependencies and build
        run: |
          pnpm install
          pnpm run build

      # 4. 部署到 Azure
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_COAST_0FEFF7A00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### 关键改动点 ######
          # 当 skip_app_build 为 true 时，app_location 必须指向打包后的生成目录
          app_location: "dist" 
          api_location: "" 
          output_location: "" # 既然 app_location 已经指向了结果，这里留空即可
          skip_app_build: true 
          ###### 结束改动点 ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_COAST_0FEFF7A00 }}
          action: "close"
